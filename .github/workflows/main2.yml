name: Capacitor Android Build

on:
  push:
    branches:
      - main  # أو master، حسب الفرع الرئيسي لمشروعك

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # استخدم إصدار حديث ومستقر

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets (إذا كان مطلوبًا)
        run: npm run build # تأكد أن هذا الأمر صحيح في ملف package.json

      - name: Copy Web Assets to Native Project
        run: npx capacitor copy android

      - name: Set up Java and Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build Android App (Release)
        run: |
          cd android
          ./gradlew assembleRelease
        # إذا كنت تريد بناء Debug، غير assembleRelease إلى assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

