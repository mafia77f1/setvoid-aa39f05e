name: TestSprite

on:
  push:
    branches: [ "main" ]

jobs:
  testsprite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run TestSprite MCP
        env:
          API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          npx @testsprite/testsprite-mcp@latest
