name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Frontend & Capacitor core)
        run: npm ci

      # 1. تم إصلاح الخطأ الأول هنا
      - name: Install Capacitor Android Dependency
        run: npm install @capacitor/android

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # تم إزالة خطوة قبول التراخيص اليدوية الطويلة والاعتماد على الأكشن
      - name: Setup Android SDK and Accept Licenses
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true 

      - name: Install Capacitor CLI (Global)
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android --skip-install

      - name: Sync Capacitor
        run: npx cap sync android

      # 2. تم إصلاح الخطأ الجديد هنا
      - name: Fix Android SDK path for Gradle
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        # استخدام خيار --no-daemon مهم في بيئات CI
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
