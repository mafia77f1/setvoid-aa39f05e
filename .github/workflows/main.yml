name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # الخطوة 1: بناء التطبيق لإنتاج مجلد dist والصورة
      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      # الخطوة 2: سحب الصورة من dist ومعالجتها (الحل الذي كشفه الـ Log)
      - name: Force Icon Implementation
        run: |
          mkdir -p src/assets
          if [ -f "./dist/setvoid.png" ]; then
            echo "Success: Image found in dist!"
            cp ./dist/setvoid.png src/assets/setvoid.png
            # جعل الصورة مربعة 1024x1024 بخلفية سوداء لضمان قبول أندرويد
            convert src/assets/setvoid.png -gravity center -background black -extent 1024x1024 src/assets/setvoid.png
          else
            echo "Error: Image NOT found in dist!"
            exit 1
          fi

      # الخطوة 3: تهيئة أندرويد ومسح الأيقونات القديمة تماماً
      - name: Capacitor Setup & Purge
        run: |
          npx cap add android || true
          # مسح شامل لكل أيقونة افتراضية قد تمنع ظهور صورتك
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          find android/app/src/main/res/ -name "ic_stat*" -delete

      # الخطوة 4: التوليد والمزامنة
      - name: Generate Assets and Sync
        run: |
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
