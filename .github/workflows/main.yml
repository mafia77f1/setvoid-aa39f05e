name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # الخطوة 1: بناء التطبيق لكي تظهر الصورة في مجلد dist كما رأينا في الـ Log
      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      # الخطوة 2: سحب الصورة من dist ومعالجتها لتصبح مربعة
      - name: Fix Icon from Dist
        run: |
          mkdir -p src/assets
          if [ -f "./dist/setvoid.png" ]; then
            echo "تم العثور على الصورة في dist، جاري المعالجة..."
            cp ./dist/setvoid.png src/assets/setvoid.png
            # تحويلها لمربعة 1024x1024 بخلفية سوداء (شرط أساسي لأندرويد)
            convert src/assets/setvoid.png -gravity center -background black -extent 1024x1024 src/assets/setvoid.png
          else
            echo "::error::الصورة لم تظهر في dist بعد الـ build!"
            exit 1
          fi

      # الخطوة 3: تهيئة أندرويد وتنظيفه من الأيقونات القديمة
      - name: Capacitor Setup & Clean
        run: |
          npx cap add android || true
          # حذف أي أيقونة قديمة لضمان عدم ظهور شعار Capacitor
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          find android/app/src/main/res/ -name "ic_stat*" -delete

      # الخطوة 4: توليد الأيقونات الجديدة والمزامنة
      - name: Generate Assets
        run: |
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
