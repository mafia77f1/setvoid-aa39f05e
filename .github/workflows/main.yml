name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # تم التحديث من 20 إلى 22 لحل مشكلة التوافق
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # أغلب مشاريع أندرويد المستقرة تفضل 17، يمكنك إبقاؤها 21 إذا كان مشروعك حديث جداً

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # هذا الخيار يغنيك عن كتابة كود قبول التراخيص يدوياً
          accept-android-sdk-licenses: true 

      - name: Install Capacitor CLI and Android platform
        run: |
          npm install @capacitor/cli@latest --save-dev
          npm install @capacitor/android@latest --save

      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
