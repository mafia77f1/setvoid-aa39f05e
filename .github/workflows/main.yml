name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      - name: Process Icon
        run: |
          # التأكد من المسار وتهيئة الصورة لتكون مربعة (مهم جداً لأندرويد)
          if [ -f "public/setvoid.png" ]; then
            convert public/setvoid.png -gravity center -background black -extent 1024x1024 public/setvoid.png
            mkdir -p src/assets
            cp public/setvoid.png src/assets/setvoid.png
          else
            echo "الصورة مفقودة في public/setvoid.png"
            exit 1
          fi

      - name: Capacitor Sync & Assets
        run: |
          npx cap add android || true
          # حذف الأيقونات القديمة لضمان عدم ظهور شعار كاباسيتور
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          npx capacitor-assets generate --assetPath public/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
