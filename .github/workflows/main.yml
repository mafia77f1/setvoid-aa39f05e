name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      - name: Fix Icon From Dist
        run: |
          # بما أننا عرفنا مكانها في dist، سننقلها فوراً للمكان الصحيح
          mkdir -p src/assets
          if [ -f "./dist/setvoid.png" ]; then
            cp ./dist/setvoid.png src/assets/setvoid.png
            # جعلها مربعة لتناسب أندرويد
            convert src/assets/setvoid.png -gravity center -background black -extent 1024x1024 src/assets/setvoid.png
          else
            echo "الصورة مفقودة حتى في dist"
            exit 1
          fi

      - name: Capacitor Setup
        run: |
          npx cap add android || true
          # حذف الأيقونات القديمة تماماً لضمان عدم ظهور شعار كاباسيتور
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
