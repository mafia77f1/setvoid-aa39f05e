name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      # خطوة معالجة الصورة في المسار الجديد
      - name: Fix Icon and Path
        run: |
          if [ -f "public/setvoid.png" ]; then
            # جعل الصورة مربعة 1:1 بخلفية سوداء لضمان قبولها
            convert public/setvoid.png -gravity center -background black -extent 1024x1024 public/setvoid.png
            mkdir -p src/assets
            cp public/setvoid.png src/assets/setvoid.png
          else
            echo "خطأ: لم نجد الصورة في public/setvoid.png"
            exit 1
          fi

      - name: Add Android platform
        run: npx cap add android || true

      # حذف الأيقونات القديمة تماماً من جذورها لضمان عدم ظهور شعار كاباسيتور
      - name: Delete Old Icons
        run: |
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          find android/app/src/main/res/ -name "ic_stat*" -delete

      - name: Generate and Sync Assets
        run: |
          npx capacitor-assets generate --assetPath public/setvoid.png
          npx cap sync android

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
