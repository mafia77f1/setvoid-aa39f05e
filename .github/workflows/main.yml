name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. حل مشكلة الـ CSS لضمان عدم فشل الـ Build
      - name: Fix CSS Order
        run: |
          find src -name "*.css" -exec sed -i '/@import/d' {} +
          find src -name "*.css" -exec sed -i '1i @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap");' {} +

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      # 2. البحث عن الصورة "انتحارياً" في كل المجلدات
      - name: Force Locate and Square Icon
        run: |
          mkdir -p src/assets
          # البحث عن الملف بكل الاحتمالات (setvoid.png, Setvoid.png, SETVOID.PNG)
          FOUND_PATH=$(find . -iname "setvoid.png" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$FOUND_PATH" ]; then
            echo "::error::الملف setvoid.png غير موجود في المستودع! تأكد من رفعه."
            exit 1
          fi
          echo "Found image at: $FOUND_PATH"
          cp "$FOUND_PATH" src/assets/setvoid.png
          # تحويل الصورة لمربعة 1024x1024 لضمان قبولها
          convert src/assets/setvoid.png -resize 1024x1024^ -gravity center -extent 1024x1024 src/assets/setvoid.png

      # 3. تنظيف أندرويد وإضافة المنصة
      - name: Capacitor Setup
        run: |
          npx cap add android || true
          # حذف الأيقونات القديمة تماماً لإجبار النظام على الجديدة
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          find android/app/src/main/res/ -name "ic_stat*" -delete

      # 4. توليد الأيقونات والمزامنة
      - name: Generate Assets and Sync
        run: |
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
