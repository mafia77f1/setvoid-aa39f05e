name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # حل مشكلة الـ CSS المذكورة في الـ Log تلقائياً
      - name: Fix CSS Import Order
        run: |
          find src -name "*.css" -exec sed -i '1i @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap");' {} +
          # حذف السطر المكرر من الأسفل إذا وجد
          find src -name "*.css" -exec sed -i '/@import.*fonts.googleapis.com/d; 1i @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap");' {} +

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      - name: Locate and Square Icon
        run: |
          mkdir -p src/assets
          # البحث عن الصورة في كل المجلدات (حتى لو كانت في مجلد فرعي)
          IMG_SRC=$(find . -name "setvoid.png" | head -n 1)
          if [ -z "$IMG_SRC" ]; then
            echo "::error::الصورة setvoid.png غير موجودة في المستودع!"
            exit 1
          fi
          cp "$IMG_SRC" src/assets/setvoid.png
          # جعلها مربعة 1:1 لضمان قبولها كأيقونة
          convert src/assets/setvoid.png -gravity center -background black -extent 1024x1024 src/assets/setvoid.png

      - name: Add/Sync Android
        run: |
          npx cap add android || true
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
