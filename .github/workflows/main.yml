name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      # هذه الخطوة هي "الجوهر": تبحث عن الصورة وتضعها في المكان الصحيح غصباً عن النظام
      - name: Force Locate and Prepare Icon
        run: |
          # البحث عن أي ملف بهذا الاسم في المشروع كله
          IMG_PATH=$(find . -iname "setvoid.png" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$IMG_PATH" ]; then
            echo "::error::لم يتم العثور على setvoid.png في أي مكان! تأكد من رفع الصورة للمستودع."
            exit 1
          fi
          
          echo "تم العثور على الصورة في: $IMG_PATH"
          mkdir -p src/assets
          
          # جعل الصورة مربعة 1024x1024 بخلفية سوداء لضمان قبول أندرويد لها
          convert "$IMG_PATH" -gravity center -background black -extent 1024x1024 src/assets/setvoid.png
          # نسخها أيضاً لمسار public للاحتياط
          mkdir -p public
          cp src/assets/setvoid.png public/setvoid.png

      - name: Add Android platform
        run: npx cap add android || true

      - name: Generate and Sync Assets
        run: |
          # نستخدم الصورة التي أصلحنا أبعادها وتأكدنا من وجودها
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
