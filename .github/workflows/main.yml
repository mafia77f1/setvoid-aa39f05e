name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev
          sudo apt-get install -y imagemagick

      # الخطوة الحاسمة: معالجة الصورة بأي ثمن
      - name: Force Fix Icon Path & Dimensions
        run: |
          mkdir -p src/assets
          # البحث عن الصورة في كل مكان ممكن (public أو dist أو src)
          IMG_PATH=$(find . -iname "setvoid.png" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$IMG_PATH" ]; then
            echo "::error::الصورة غير موجودة نهائياً! ارفعها باسم setvoid.png"
            exit 1
          fi
          
          echo "Found image at: $IMG_PATH"
          # تحويل الصورة لمربع 1024x1024 لضمان قبول أندرويد
          convert "$IMG_PATH" -gravity center -background black -extent 1024x1024 src/assets/setvoid.png

      - name: Capacitor Android Setup
        run: |
          npx cap add android || true
          # حذف الأيقونات القديمة تماماً لضمان عدم ظهور شعار Capacitor الأزرق
          find android/app/src/main/res/ -name "ic_launcher*" -delete
          find android/app/src/main/res/ -name "ic_stat*" -delete

      # توليد الأصول وفرض المزامنة
      - name: Generate and Sync
        run: |
          npx capacitor-assets generate --assetPath src/assets/setvoid.png
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
