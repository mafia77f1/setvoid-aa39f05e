name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/assets --save-dev

      # تأكد من وجود المجلد والصورة
      - name: Verify and Fix Image Path
        run: |
          mkdir -p src/assets
          # ابحث عن أي ملف png في المشروع وانقله للمسار الصحيح إذا فقد
          find . -name "setvoid.png" -exec cp {} src/assets/setvoid.png \;

      - name: Prepare Icon (Square 1:1)
        run: |
          sudo apt-get install -y imagemagick
          if [ -f "src/assets/setvoid.png" ]; then
            convert src/assets/setvoid.png -gravity center -background black -extent 1024x1024 src/assets/setvoid.png
          else
            echo "CRITICAL ERROR: Image setvoid.png NOT FOUND IN REPOSITORY"
            exit 1
          fi

      - name: Add Android platform
        run: npx cap add android || true

      - name: Generate Mobile Assets
        run: npx capacitor-assets generate --assetPath src/assets/setvoid.png
        
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
